<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&amp;family=Anton&amp;family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&amp;family=Space+Mono:wght@400;700&amp;family=Rubik+Dirt&amp;display=swap');
      .title { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; }
      .num   { font-family:'Anton',sans-serif; }
      .serif { font-family:'Fraunces',serif; font-style:italic; }
      .mono  { font-family:'Space Mono',monospace; }
      .stamp { font-family:'Rubik Dirt',system-ui; }
    </style>
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CF4E15" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#CF4E15" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#CF4E15" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tilt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B6BA8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B32424" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#E49B18" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#E49B18" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#09090B"/>

  <!-- header -->
  <text x="40" y="52" class="title" font-size="30" fill="#F0EBE1">COURTGRAPH · GENESIS SEQUENCE</text>
  <text x="40" y="76" class="mono" font-size="12" fill="#968D82">motion as explanation — eight states, each mark earns its meaning · Phase 10A motion architecture</text>
  <text x="1240" y="60" text-anchor="end" class="num" font-size="34" fill="#E49B18">10A</text>
  <line x1="40" y1="92" x2="1240" y2="92" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- ================= ROW 1 ================= -->
  <!-- Panel 1: EMPTY -->
  <g transform="translate(40,108)">
    <rect width="282" height="252" fill="#0D0E14" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="16" y="30" class="mono" font-size="11" fill="#4A4744">01</text>
    <text x="40" y="30" class="title" font-size="15" fill="#968D82">EMPTY</text>
    <path d="M40 150 Q141 110 242 150" fill="none" stroke="#4A4744" stroke-width="1" stroke-dasharray="3 6"/>
    <circle cx="141" cy="150" r="3" fill="#4A4744"/>
    <text x="16" y="228" class="serif" font-size="13" fill="#968D82">Before the market speaks,</text>
    <text x="16" y="244" class="serif" font-size="13" fill="#968D82">there is no court.</text>
  </g>

  <!-- Panel 2: MARKET-FORMING (the burn) -->
  <g transform="translate(354,108)">
    <rect width="282" height="252" fill="#0D0E14" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="16" y="30" class="mono" font-size="11" fill="#4A4744">02</text>
    <text x="40" y="30" class="title" font-size="15" fill="#CF4E15">MARKET-FORMING</text>
    <circle cx="141" cy="150" r="58" fill="url(#emberGlow)"/>
    <g class="mono" font-size="11" fill="#5BA8D4">
      <text x="22" y="74">-4</text><line x1="40" y1="70" x2="118" y2="138" stroke="#5BA8D4" stroke-opacity="0.4"/>
      <text x="232" y="78" text-anchor="end">202</text><line x1="224" y1="74" x2="164" y2="138" stroke="#5BA8D4" stroke-opacity="0.4"/>
      <text x="26" y="210">ML</text><line x1="44" y1="204" x2="120" y2="166" stroke="#5BA8D4" stroke-opacity="0.4"/>
    </g>
    <circle cx="141" cy="150" r="20" fill="none" stroke="#CF4E15" stroke-width="2"/>
    <text x="16" y="228" class="serif" font-size="13" fill="#968D82">Odds collapse into the hub.</text>
    <text x="16" y="244" class="serif" font-size="13" fill="#CF4E15">The market sets the court.</text>
  </g>

  <!-- Panel 3: COURT-DRAWING -->
  <g transform="translate(668,108)">
    <rect width="282" height="252" fill="#0D0E14" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="16" y="30" class="mono" font-size="11" fill="#4A4744">03</text>
    <text x="40" y="30" class="title" font-size="15" fill="#968D82">COURT-DRAWING</text>
    <g stroke="#ffffff" stroke-opacity="0.07"><line x1="30" y1="120" x2="252" y2="120"/><line x1="30" y1="150" x2="252" y2="150"/><line x1="30" y1="180" x2="252" y2="180"/><line x1="90" y1="108" x2="90" y2="192"/><line x1="141" y1="108" x2="141" y2="192"/><line x1="192" y1="108" x2="192" y2="192"/></g>
    <line x1="30" y1="150" x2="252" y2="150" stroke="#F0EBE1" stroke-width="2"/>
    <text x="30" y="100" class="num" font-size="18" fill="#E49B18">103</text>
    <text x="252" y="100" text-anchor="end" class="num" font-size="18" fill="#E49B18">99</text>
    <text x="16" y="228" class="serif" font-size="13" fill="#968D82">Implied score becomes</text>
    <text x="16" y="244" class="serif" font-size="13" fill="#968D82">geometry — the par line.</text>
  </g>

  <!-- Panel 4: LINEUPS-ENTERING -->
  <g transform="translate(982,108)">
    <rect width="282" height="252" fill="#0D0E14" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="16" y="30" class="mono" font-size="11" fill="#4A4744">04</text>
    <text x="40" y="30" class="title" font-size="15" fill="#968D82">LINEUPS-ENTERING</text>
    <line x1="30" y1="178" x2="252" y2="178" stroke="#F0EBE1" stroke-width="1.5"/>
    <g stroke="#4A4744" stroke-dasharray="2 4"><line x1="60" y1="70" x2="60" y2="170"/><line x1="105" y1="60" x2="105" y2="170"/><line x1="150" y1="64" x2="150" y2="170"/><line x1="195" y1="58" x2="195" y2="170"/><line x1="225" y1="72" x2="225" y2="170"/></g>
    <circle cx="60" cy="170" r="8" fill="#1A1C28" stroke="#5BA8D4"/>
    <circle cx="105" cy="170" r="11" fill="#CF4E15"/>
    <circle cx="150" cy="170" r="8" fill="#1A1C28" stroke="#5BA8D4"/>
    <circle cx="195" cy="170" r="8" fill="#1A1C28" stroke="#5BA8D4"/>
    <circle cx="225" cy="170" r="8" fill="#1A1C28" stroke="#CC6B6B"/>
    <text x="16" y="228" class="serif" font-size="13" fill="#968D82">Starters become nodes.</text>
    <text x="16" y="244" class="serif" font-size="13" fill="#968D82">The lineup shapes it.</text>
  </g>

  <!-- ================= ROW 2 ================= -->
  <!-- Panel 5: COURT-TILTING -->
  <g transform="translate(40,384)">
    <rect width="282" height="252" fill="#0D0E14" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="16" y="30" class="mono" font-size="11" fill="#4A4744">05</text>
    <text x="40" y="30" class="title" font-size="15" fill="#968D82">COURT-TILTING</text>
    <polygon points="40,180 240,180 210,120 70,120" fill="url(#tilt)" stroke="#ffffff" stroke-opacity="0.1"/>
    <line x1="40" y1="180" x2="240" y2="180" stroke="#F0EBE1" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="56" y1="196" x2="224" y2="196" stroke="#CF4E15" stroke-width="2"/>
    <text x="232" y="150" text-anchor="end" class="mono" font-size="9" fill="#CC6B6B">PRESSURE</text>
    <text x="50" y="150" class="mono" font-size="9" fill="#5BA8D4">RELIEF</text>
    <text x="16" y="228" class="serif" font-size="13" fill="#968D82">Lineup + archetype</text>
    <text x="16" y="244" class="serif" font-size="13" fill="#968D82">bend the par downward.</text>
  </g>

  <!-- Panel 6: ARCHETYPE-LENS -->
  <g transform="translate(354,384)">
    <rect width="282" height="252" fill="#0D0E14" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="16" y="30" class="mono" font-size="11" fill="#4A4744">06</text>
    <text x="40" y="30" class="title" font-size="15" fill="#968D82">ARCHETYPE-LENS</text>
    <g stroke="#ffffff" stroke-opacity="0.08"><line x1="30" y1="110" x2="252" y2="110"/><line x1="30" y1="150" x2="252" y2="150"/><line x1="30" y1="190" x2="252" y2="190"/></g>
    <ellipse cx="141" cy="150" rx="62" ry="46" fill="#1B6BA8" fill-opacity="0.10" stroke="#5BA8D4" stroke-opacity="0.6"/>
    <path d="M88 150 Q141 128 194 150" stroke="#5BA8D4" fill="none" stroke-opacity="0.7"/>
    <path d="M88 150 Q141 172 194 150" stroke="#CC6B6B" fill="none" stroke-opacity="0.7"/>
    <text x="141" y="120" text-anchor="middle" class="mono" font-size="9" fill="#5BA8D4">FIT 28 · DIFF 75</text>
    <text x="16" y="228" class="serif" font-size="13" fill="#968D82">Same court, translated</text>
    <text x="16" y="244" class="serif" font-size="13" fill="#968D82">differently per player.</text>
  </g>

  <!-- Panel 7: POSSESSION-REPLAY -->
  <g transform="translate(668,384)">
    <rect width="282" height="252" fill="#0D0E14" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="16" y="30" class="mono" font-size="11" fill="#4A4744">07</text>
    <text x="40" y="30" class="title" font-size="15" fill="#968D82">POSSESSION-REPLAY</text>
    <line x1="30" y1="150" x2="252" y2="150" stroke="#F0EBE1" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M34 188 L70 176 L102 182 L134 150 L168 138 L206 120 L246 96" fill="none" stroke="url(#trail)" stroke-width="2.5"/>
    <g fill="#E49B18"><circle cx="70" cy="176" r="3"/><circle cx="134" cy="150" r="3"/><circle cx="206" cy="120" r="4"/><circle cx="246" cy="96" r="5"/></g>
    <path d="M214 150 l24 -14" stroke="#CF4E15" stroke-width="3"/>
    <text x="200" y="172" class="mono" font-size="9" fill="#CF4E15">SCAR</text>
    <text x="16" y="228" class="serif" font-size="13" fill="#968D82">The proof trail lights the</text>
    <text x="16" y="244" class="serif" font-size="13" fill="#968D82">actual evidence.</text>
  </g>

  <!-- Panel 8: OUTCOME-STAMP + confidence ring -->
  <g transform="translate(982,384)">
    <rect width="282" height="252" fill="#0D0E14" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="16" y="30" class="mono" font-size="11" fill="#4A4744">08</text>
    <text x="40" y="30" class="title" font-size="15" fill="#968D82">OUTCOME-STAMP</text>
    <circle cx="141" cy="140" r="50" fill="none" stroke="#1A1C28" stroke-width="7"/>
    <circle cx="141" cy="140" r="50" fill="none" stroke="#E49B18" stroke-width="7" stroke-dasharray="188 314" stroke-linecap="round" transform="rotate(-90 141 140)"/>
    <text x="141" y="134" text-anchor="middle" class="stamp" font-size="17" fill="#CF4E15">BEAT</text>
    <text x="141" y="156" text-anchor="middle" class="num" font-size="22" fill="#F0EBE1">+8.6</text>
    <text x="141" y="208" text-anchor="middle" class="mono" font-size="9" fill="#E49B18">CONF 0.60 · PROVISIONAL</text>
    <text x="16" y="232" class="serif" font-size="13" fill="#968D82">The verdict arrives after</text>
    <text x="16" y="247" class="serif" font-size="13" fill="#968D82">evidence; confidence confesses.</text>
  </g>

  <!-- footer spine -->
  <line x1="40" y1="664" x2="1240" y2="664" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="40" y="692" class="mono" font-size="11" fill="#968D82">RULE — if a motion does not explain the system, it is removed. Every state has a static end-frame for prefers-reduced-motion.</text>
  <text x="1240" y="692" text-anchor="end" class="serif" font-size="13" fill="#CF4E15">make it breathe · do not let it lie</text>
</svg>
