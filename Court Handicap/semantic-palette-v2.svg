<svg viewBox="0 0 1280 660" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&amp;family=Space+Mono:wght@400;700&amp;family=Fraunces:ital,opsz,wght@1,9..144,400&amp;display=swap');
      .title { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; }
      .sect  { font-family:'Bricolage Grotesque',sans-serif; font-weight:600; letter-spacing:.14em; }
      .mono  { font-family:'Space Mono',monospace; }
      .serif { font-family:'Fraunces',serif; font-style:italic; }
      .badge { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; letter-spacing:.1em; font-size:11px; }
    </style>
    <pattern id="prov2" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#1A1C28"/><line x1="0" y1="0" x2="0" y2="8" stroke="#E49B18" stroke-width="3"/>
    </pattern>
  </defs>
  <rect width="1280" height="660" fill="#09090B"/>

  <text x="40" y="48" class="title" font-size="26" fill="#F0EBE1">SEMANTIC PALETTE v2 — AMBER COLLISION RESOLVED</text>
  <text x="40" y="72" class="mono" font-size="12" fill="#357A4E">✓ amber is now confidence-only · stale → rust+clock · last-known-good → grey · what-if → blue+tilde</text>
  <line x1="40" y1="88" x2="1240" y2="88" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- SOURCE STATE row: pill + marker, grayscale-safe -->
  <text x="40" y="116" class="sect" font-size="12" fill="#5BA8D4">SOURCE STATE — pill + marker glyph, never hue alone</text>
  <g transform="translate(40,128)"><rect width="200" height="34" fill="#1B6BA8"/><text x="12" y="22" class="badge" fill="#09090B">● LIVE</text></g>
  <g transform="translate(256,128)"><rect width="200" height="34" fill="#C2611C"/><text x="12" y="22" class="badge" fill="#09090B">◷ LIVE · STALE</text></g>
  <g transform="translate(472,128)"><rect width="220" height="34" fill="#6E6A60"/><text x="12" y="22" class="badge" fill="#09090B">⛁ LAST-KNOWN-GOOD</text></g>
  <g transform="translate(708,128)"><rect width="150" height="34" fill="#1A1C28" stroke="#CC6B6B"/><text x="12" y="22" class="badge" fill="#CC6B6B">▼ FALLBACK</text></g>
  <g transform="translate(874,128)"><rect width="170" height="34" fill="#968D82"/><text x="12" y="22" class="badge" fill="#09090B">⚗ SYNTHETIC</text></g>
  <text x="40" y="186" class="mono" font-size="9.5" fill="#968D82">#1B6BA8 live · #C2611C stale · #6E6A60 cached · #1A1C28+crimson fallback · #968D82 synthetic — each with a marker glyph</text>

  <!-- grayscale proof strip -->
  <text x="40" y="222" class="sect" font-size="12" fill="#5BA8D4">GRAYSCALE PROOF — the marker carries the truth when hue is gone</text>
  <g transform="translate(40,234)" fill="#3a3a3a">
    <g><rect width="200" height="34" fill="#7d7d7d"/><text x="12" y="22" class="badge" fill="#111">● LIVE</text></g>
    <g transform="translate(216,0)"><rect width="200" height="34" fill="#6a6a6a"/><text x="12" y="22" class="badge" fill="#111">◷ STALE</text></g>
    <g transform="translate(432,0)"><rect width="220" height="34" fill="#5e5e5e"/><text x="12" y="22" class="badge" fill="#111">⛁ LAST-KNOWN-GOOD</text></g>
    <g transform="translate(668,0)"><rect width="150" height="34" fill="#2a2a2a" stroke="#888"/><text x="12" y="22" class="badge" fill="#bbb">▼ FALLBACK</text></g>
    <g transform="translate(834,0)"><rect width="170" height="34" fill="#888"/><text x="12" y="22" class="badge" fill="#111">⚗ SYNTHETIC</text></g>
  </g>

  <!-- CONFIDENCE ladder: amber owned here -->
  <text x="40" y="320" class="sect" font-size="12" fill="#5BA8D4">CONFIDENCE — its own ladder; amber belongs to MEDIUM only</text>
  <g transform="translate(40,332)">
    <rect width="120" height="34" fill="#B32424"/><text x="12" y="22" class="badge" fill="#F0EBE1">▁ LOW</text>
    <rect x="136" width="120" height="34" fill="#E49B18"/><text x="148" y="22" class="badge" fill="#09090B">▄ MEDIUM</text>
    <rect x="272" width="120" height="34" fill="#357A4E"/><text x="284" y="22" class="badge" fill="#F0EBE1">█ HIGH</text>
    <rect x="408" width="150" height="34" fill="url(#prov2)"/><text x="420" y="22" class="badge" fill="#E49B18">▚ PROVISIONAL</text>
  </g>
  <text x="40" y="390" class="mono" font-size="9.5" fill="#968D82">rung height encodes the tier — readable even if amber and crimson desaturate together</text>

  <!-- PRESSURE & EVIDENCE -->
  <text x="40" y="426" class="sect" font-size="12" fill="#5BA8D4">PRESSURE &amp; EVIDENCE — forces, not badges</text>
  <g transform="translate(40,438)">
    <rect width="150" height="34" fill="#E49B18"/><text x="12" y="22" class="badge" fill="#09090B">MARKET ▲</text>
    <rect x="166" width="150" height="34" fill="#B32424"/><text x="178" y="22" class="badge" fill="#F0EBE1">LINEUP ▲</text>
    <rect x="332" width="180" height="34" fill="#CC6B6B"/><text x="344" y="22" class="badge" fill="#09090B">ARCHETYPE ▲</text>
    <rect x="528" width="130" height="34" fill="#5BA8D4"/><text x="540" y="22" class="badge" fill="#09090B">RELIEF ▽</text>
    <rect x="674" width="130" height="34" fill="#CF4E15"/><text x="686" y="22" class="badge" fill="#F0EBE1">PROOF ✦</text>
    <rect x="820" width="160" height="34" fill="#968D82" fill-opacity="0.30" stroke="#4A4744" stroke-dasharray="4 4"/><text x="832" y="22" class="badge" fill="#968D82">SHADOW (ghost)</text>
  </g>
  <text x="40" y="496" class="mono" font-size="9.5" fill="#B8862F">note — MARKET keeps amber as a directional FORCE (▲), distinct in shape/place from the MEDIUM confidence rung. Moving market → ember is the validated-by-pixels option.</text>

  <!-- footer -->
  <line x1="40" y1="560" x2="1240" y2="560" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="40" y="586" class="mono" font-size="11" fill="#357A4E">RESOLVED — confidence-MEDIUM, last-known-good, and what-if no longer share one amber. Verified by 7 self-checks in ui-honesty-audit.</text>
  <text x="40" y="606" class="mono" font-size="11" fill="#968D82">CORRECTION — the 10A study mislabeled STALE as amber; in shipped code STALE was crimson (colliding with fallback/LOW). v2 moves it to rust.</text>
  <text x="40" y="630" class="serif" font-size="13" fill="#CF4E15">the badge tells the truth even in grayscale.</text>
</svg>
